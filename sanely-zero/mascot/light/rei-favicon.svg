<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Rei favicon: circle (zero) with amber dot (eye) only -->
  <!-- The iconic element, works at 16-32px -->

  <!-- The zero — clean circle -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#1B1F3B" stroke-width="2.5"/>

  <!-- The eye — amber disc with dark pupil -->
  <circle cx="16" cy="16" r="5" fill="#FF9F1C"/>
  <circle cx="16" cy="16" r="2" fill="#1B1F3B"/>
  <circle cx="17.2" cy="14.8" r="0.8" fill="white" opacity="0.85"/>
</svg>