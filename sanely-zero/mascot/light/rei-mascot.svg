<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" width="800" height="900">
  <defs>
    <linearGradient id="wingL" x1="0.9" y1="0.2" x2="0.1" y2="0.8">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#006E85"/>
    </linearGradient>
    <linearGradient id="wingR" x1="0.1" y1="0.2" x2="0.9" y2="0.8">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#006E85"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#2E3358"/>
      <stop offset="100%" stop-color="#1B1F3B"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF9F1C" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#FF9F1C" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF9F1C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g transform="translate(400, 390)">

    <!-- ================================================== -->
    <!-- THE SWIFT — continuous crescent silhouette          -->
    <!-- Left wingtip → body → right wingtip as ONE shape   -->
    <!-- The whole bird is a single boomerang/crescent       -->
    <!-- ================================================== -->

    <!-- FULL CRESCENT — one path for the entire swift silhouette -->
    <!-- This is the teal wing form: left tip through center to right tip -->
    <!-- The body area is where it widens vertically -->
    <path d="
      M -340,-130
      C -328,-142 -305,-148 -275,-142
      C -228,-130 -175,-108 -125,-78
      C -78,-50 -40,-18 -16,12
      C -6,24 0,34 0,38
      C 0,34 6,24 16,12
      C 40,-18 78,-50 125,-78
      C 175,-108 228,-130 275,-142
      C 305,-148 328,-142 340,-130
      C 348,-122 348,-112 338,-104
      C 320,-90 290,-82 255,-74
      C 200,-60 145,-40 98,-14
      C 60,8 32,30 16,50
      C 8,60 4,64 0,66
      C -4,64 -8,60 -16,50
      C -32,30 -60,8 -98,-14
      C -145,-40 -200,-60 -255,-74
      C -290,-82 -320,-90 -338,-104
      C -348,-112 -348,-122 -340,-130
      Z
    " fill="url(#wingL)"/>

    <!-- Right wing overlay with its own gradient for depth -->
    <path d="
      M 340,-130
      C 328,-142 305,-148 275,-142
      C 228,-130 175,-108 125,-78
      C 78,-50 40,-18 16,12
      C 6,24 0,34 0,38
      L 0,66
      C 4,64 8,60 16,50
      C 32,30 60,8 98,-14
      C 145,-40 200,-60 255,-74
      C 290,-82 320,-90 338,-104
      C 348,-112 348,-122 340,-130
      Z
    " fill="url(#wingR)"/>

    <!-- BODY CENTER — indigo overlay on the thickened hub -->
    <!-- Narrower, shorter, sits on top of the teal crescent -->
    <path d="
      M 0,-52
      C 8,-48 13,-36 14,-20
      C 15,-2 14,18 12,38
      C 10,58 7,78 5,92
      C 3,102 1,108 0,112
      C -1,108 -3,102 -5,92
      C -7,78 -10,58 -12,38
      C -14,18 -15,-2 -14,-20
      C -13,-36 -8,-48 0,-52
      Z
    " fill="url(#bodyGrad)"/>

    <!-- HEAD — small dot, continuous with body -->
    <ellipse cx="0" cy="-58" rx="8" ry="9" fill="#1B1F3B"/>

    <!-- TAIL — deeply forked swift tail -->
    <path d="
      M -2,108
      L -22,175
      L -3,152
      L 0,185
      L 3,152
      L 22,175
      L 2,108
      Z
    " fill="#1B1F3B"/>

    <!-- ===================================== -->
    <!-- THE ZERO — in the crescent void       -->
    <!-- ===================================== -->
    <circle cx="0" cy="-8" r="35" fill="none" stroke="#FF9F1C" stroke-width="1.4" opacity="0.25"/>

    <!-- ===================================== -->
    <!-- THE EYE                                -->
    <!-- ===================================== -->
    <circle cx="0" cy="-8" r="16" fill="url(#eyeGlow)"/>
    <circle cx="0" cy="-8" r="7.5" fill="#FF9F1C"/>
    <circle cx="0" cy="-8" r="2.8" fill="#1B1F3B"/>
    <circle cx="1.8" cy="-10.2" r="1.1" fill="white" opacity="0.9"/>

  </g>

  <!-- ============================== -->
  <!-- TRAIL — dissolving JSON        -->
  <!-- ============================== -->
  <text x="565" y="248" font-family="'Courier New',monospace" font-size="24" font-weight="700" fill="#00D4FF" opacity="0.4" transform="rotate(-10, 565, 248)">{</text>
  <text x="600" y="220" font-family="'Courier New',monospace" font-size="17" font-weight="700" fill="#00D4FF" opacity="0.24" transform="rotate(-15, 600, 220)">}</text>
  <rect x="628" y="198" width="7" height="7" rx="1" fill="#00D4FF" opacity="0.14" transform="rotate(-18, 631, 202)"/>
  <circle cx="652" cy="182" r="2" fill="#00D4FF" opacity="0.08"/>

  <!-- ============================== -->
  <!-- TEXT                            -->
  <!-- ============================== -->
  <text x="400" y="680" text-anchor="middle"
        font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="38" font-weight="400" fill="#1B1F3B" letter-spacing="1.5">sanely-zero</text>
  <text x="400" y="715" text-anchor="middle"
        font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="12.5" font-weight="400" fill="#1B1F3B" opacity="0.4" letter-spacing="0.5">zero dependencies.  compile-time foresight.  fastest JSON.</text>

</svg>