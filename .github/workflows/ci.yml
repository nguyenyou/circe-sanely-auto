name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: JVM unit tests
            command: ./mill sanely.jvm.test
          - name: Scala.js unit tests
            command: ./mill sanely.js.test
          - name: Compat tests
            command: ./mill compat.test
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 25
      - run: ${{ matrix.command }}
