name: CI

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: JVM unit tests
            command: ./mill sanely.jvm.test
          - name: Scala.js unit tests
            command: ./mill sanely.js.test
          - name: Compat tests (JVM)
            command: ./mill compat.jvm.test
          - name: Compat tests (Scala.js)
            command: ./mill compat.js.test
          - name: sanely-jsoniter (JVM)
            command: ./mill sanely-jsoniter.jvm.test
          - name: sanely-jsoniter (Scala.js)
            command: ./mill sanely-jsoniter.js.test
          - name: Tapir integration tests
            command: ./mill tapir-test.test
          - name: Zinc incremental compilation
            command: bash test-zinc.sh
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - run: ${{ matrix.command }}
