name: Benchmark

on:
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Version label (e.g., v0.13.0). Leave empty to use latest git tag."
        default: ""
      compile_runs:
        description: "Number of compile-time benchmark runs"
        default: "10"
      runtime_warmup:
        description: "Runtime benchmark warmup iterations"
        default: "10"
      runtime_iterations:
        description: "Runtime benchmark measurement iterations"
        default: "10"
  issue_comment:
    types: [created]

concurrency:
  group: benchmark-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: true

env:
  COMPILE_RUNS: ${{ inputs.compile_runs || '10' }}
  RUNTIME_WARMUP: ${{ inputs.runtime_warmup || '10' }}
  RUNTIME_ITERATIONS: ${{ inputs.runtime_iterations || '10' }}

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    # Run for: manual dispatch, successful release, or /benchmark comment from collaborators
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '/benchmark') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    permissions:
      pull-requests: write
      issues: write
    outputs:
      ref: ${{ steps.config.outputs.ref }}
      version: ${{ steps.config.outputs.version }}
      mode: ${{ steps.config.outputs.mode }}
      pr_number: ${{ steps.config.outputs.pr_number }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure
        id: config
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            PR="${{ github.event.issue.number }}"
            REF=$(gh pr view "$PR" --json headRefOid --jq '.headRefOid')
            echo "ref=$REF" >> "$GITHUB_OUTPUT"
            echo "version=PR #$PR" >> "$GITHUB_OUTPUT"
            echo "mode=pr" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
            echo "mode=release" >> "$GITHUB_OUTPUT"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
          else
            REF="${{ github.sha }}"
            VERSION="${{ inputs.version }}"
            if [ -z "$VERSION" ]; then
              VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo dev)
            fi
            echo "ref=$REF" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "mode=release" >> "$GITHUB_OUTPUT"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
          fi

      - name: React to comment
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content=rocket

  compile-auto:
    name: compile-auto
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.setup.outputs.ref }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Install hyperfine
        run: |
          wget -qO /tmp/hyperfine.deb https://github.com/sharkdp/hyperfine/releases/download/v1.18.0/hyperfine_1.18.0_amd64.deb
          sudo dpkg -i /tmp/hyperfine.deb
      - name: Run benchmark
        run: bash bench.sh "$COMPILE_RUNS" 2>&1 | tee compile-auto.txt
      - uses: actions/upload-artifact@v4
        with:
          name: compile-auto
          path: compile-auto.txt

  compile-configured:
    name: compile-configured
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.setup.outputs.ref }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Install hyperfine
        run: |
          wget -qO /tmp/hyperfine.deb https://github.com/sharkdp/hyperfine/releases/download/v1.18.0/hyperfine_1.18.0_amd64.deb
          sudo dpkg -i /tmp/hyperfine.deb
      - name: Run benchmark
        run: bash bench.sh --configured "$COMPILE_RUNS" 2>&1 | tee compile-configured.txt
      - uses: actions/upload-artifact@v4
        with:
          name: compile-configured
          path: compile-configured.txt

  runtime:
    name: runtime
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.setup.outputs.ref }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Reduce CI noise
        run: |
          # Disable CPU frequency scaling (use performance governor)
          for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
            echo performance | sudo tee "$cpu" 2>/dev/null || true
          done
          # Disable turbo boost to reduce variance
          echo 1 | sudo tee /sys/devices/system/cpu/intel_pstate/no_turbo 2>/dev/null || true
      - name: Run JMH benchmark
        run: |
          ./mill benchmark-jmh.runJmh \
            -wi "$RUNTIME_WARMUP" \
            -i "$RUNTIME_ITERATIONS" \
            -f 1 -r 1 -w 1 2>&1 | tee runtime.txt
      - uses: actions/upload-artifact@v4
        with:
          name: runtime
          path: runtime.txt

  macro-profile-auto:
    name: macro-profile-auto
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.setup.outputs.ref }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Run profiled compilation
        run: |
          rm -rf out/benchmark/sanely
          SANELY_PROFILE=true ./mill --no-server benchmark.sanely.compile 2>&1 | tee /tmp/raw-profile.txt
      - name: Analyze profile
        run: python3 .claude/skills/macro-profile/scripts/analyze_profile.py /tmp/raw-profile.txt 2>&1 | tee macro-profile-auto.txt
      - uses: actions/upload-artifact@v4
        with:
          name: macro-profile-auto
          path: macro-profile-auto.txt

  macro-profile-configured:
    name: macro-profile-configured
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.setup.outputs.ref }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Run profiled compilation
        run: |
          rm -rf out/benchmark-configured/sanely
          SANELY_PROFILE=true ./mill --no-server benchmark-configured.sanely.compile 2>&1 | tee /tmp/raw-profile.txt
      - name: Analyze profile
        run: python3 .claude/skills/macro-profile/scripts/analyze_profile.py /tmp/raw-profile.txt 2>&1 | tee macro-profile-configured.txt
      - uses: actions/upload-artifact@v4
        with:
          name: macro-profile-configured
          path: macro-profile-configured.txt

  peak-rss:
    name: peak-rss
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.setup.outputs.ref }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Pre-compile dependencies
        run: |
          # Pre-compile shared deps so --no-server runs only measure the benchmark module
          ./mill sanely.jvm.compile >/dev/null 2>/dev/null
          ./mill benchmark-configured.generic-compat.compile >/dev/null 2>/dev/null
      - name: Measure Peak RSS
        run: |
          measure_rss() {
            local module="$1" clean_dir="$2"
            rm -rf "$clean_dir"
            # --no-server: runs compiler in-process so /usr/bin/time captures actual compiler RSS
            /usr/bin/time -v ./mill --no-server "$module" > /dev/null 2> /tmp/time-output.txt
            grep "Maximum resident set size" /tmp/time-output.txt | awk '{print $NF}'
          }

          {
            RSS=$(measure_rss "benchmark.sanely.compile" "out/benchmark/sanely")
            echo "sanely-auto (auto): $RSS KB"

            RSS=$(measure_rss "benchmark.generic.compile" "out/benchmark/generic")
            echo "circe-generic (auto): $RSS KB"

            RSS=$(measure_rss "benchmark-configured.sanely.compile" "out/benchmark-configured/sanely")
            echo "sanely-auto (configured): $RSS KB"

            RSS=$(measure_rss "benchmark-configured.generic.compile" "out/benchmark-configured/generic")
            echo "circe-generic (configured): $RSS KB"
          } | tee peak-rss.txt
      - uses: actions/upload-artifact@v4
        with:
          name: peak-rss
          path: peak-rss.txt

  bytecode-impact:
    name: bytecode-impact
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.setup.outputs.ref }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Compile and measure bytecode
        run: |
          # Compile each module individually to ensure all succeed
          ./mill benchmark.sanely.compile
          ./mill benchmark.generic.compile
          ./mill benchmark-configured.sanely.compile
          ./mill benchmark-configured.generic.compile

          measure_bytecode() {
            local label="$1" classes_dir="$2"
            if [ ! -d "$classes_dir" ]; then
              echo "$label: ERROR — classes dir not found at $classes_dir"
              return
            fi
            local bytes
            bytes=$(find "$classes_dir" -name '*.class' -print0 | xargs -0 stat --format='%s' | awk '{s+=$1} END {print s+0}')
            local kb
            kb=$(awk "BEGIN {printf \"%.1f\", $bytes / 1024}")
            echo "$label: $bytes bytes ($kb KB)"
          }

          {
            measure_bytecode "sanely-auto (auto)" "out/benchmark/sanely/compile.dest/classes"
            measure_bytecode "circe-generic (auto)" "out/benchmark/generic/compile.dest/classes"
            measure_bytecode "sanely-auto (configured)" "out/benchmark-configured/sanely/compile.dest/classes"
            measure_bytecode "circe-generic (configured)" "out/benchmark-configured/generic/compile.dest/classes"
          } 2>&1 | tee bytecode-impact.txt
      - uses: actions/upload-artifact@v4
        with:
          name: bytecode-impact
          path: bytecode-impact.txt

  # ── Post-release: accumulate results in BENCHMARK.md ──
  update-benchmark-md:
    name: Update BENCHMARK.md
    needs: [setup, compile-auto, compile-configured, runtime, macro-profile-auto, macro-profile-configured, peak-rss, bytecode-impact]
    if: needs.setup.outputs.mode == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Build new section
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          SHA="${{ needs.setup.outputs.ref }}"
          DATE="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          {
            echo ""
            echo "## $VERSION"
            echo ""
            echo "**Date:** $DATE | **SHA:** \`${SHA:0:7}\`"
            echo ""
            python3 scripts/summarize_benchmark.py results
          } > new-section.md

      - name: Update BENCHMARK.md
        run: |
          MARKER="<!-- BENCHMARK ENTRIES -->"

          if [ -f BENCHMARK.md ] && grep -q "$MARKER" BENCHMARK.md; then
            sed -i "/$MARKER/r new-section.md" BENCHMARK.md
          else
            {
              echo "# Benchmark History"
              echo ""
              echo "Automated benchmarks run on \`ubuntu-latest\` after each release."
              echo ""
              echo "$MARKER"
              cat new-section.md
            } > BENCHMARK.md
          fi

          echo "--- BENCHMARK.md ---"
          cat BENCHMARK.md

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          BRANCH="benchmark/$VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add BENCHMARK.md
          git commit -m "docs: add benchmark results for $VERSION"
          git push -f -u origin "$BRANCH"

          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists — updated via force push"
          else
            gh pr create \
              --title "Benchmark results for $VERSION" \
              --body "Automated benchmark results. Merge to accumulate in BENCHMARK.md." \
              --base main
          fi

  # ── PR comment: post results on the pull request ──
  post-pr-comment:
    name: Post PR comment
    needs: [setup, compile-auto, compile-configured, runtime, macro-profile-auto, macro-profile-configured, peak-rss, bytecode-impact]
    if: needs.setup.outputs.mode == 'pr'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Post comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ needs.setup.outputs.ref }}"
          PR="${{ needs.setup.outputs.pr_number }}"

          {
            echo "## Benchmark Results"
            echo ""
            echo "**SHA:** \`${SHA:0:7}\` | **Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC') | **Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""
            python3 scripts/summarize_benchmark.py results
          } > /tmp/comment-body.md

          gh pr comment "$PR" --body-file /tmp/comment-body.md
