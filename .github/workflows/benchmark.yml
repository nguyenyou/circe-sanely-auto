name: Benchmark

on:
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Version label (e.g., v0.13.0). Leave empty to use latest git tag."
        default: ""
      compile_runs:
        description: "Number of compile-time benchmark runs"
        default: "10"
      runtime_warmup:
        description: "Runtime benchmark warmup iterations"
        default: "10"
      runtime_iterations:
        description: "Runtime benchmark measurement iterations"
        default: "10"
  issue_comment:
    types: [created]

concurrency:
  group: benchmark-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: true

env:
  COMPILE_RUNS: ${{ inputs.compile_runs || '10' }}
  RUNTIME_WARMUP: ${{ inputs.runtime_warmup || '10' }}
  RUNTIME_ITERATIONS: ${{ inputs.runtime_iterations || '10' }}

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    # Run for: manual dispatch, successful release, or /benchmark comment from collaborators
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '/benchmark') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    permissions:
      pull-requests: write
      issues: write
    outputs:
      ref: ${{ steps.config.outputs.ref }}
      version: ${{ steps.config.outputs.version }}
      mode: ${{ steps.config.outputs.mode }}
      pr_number: ${{ steps.config.outputs.pr_number }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure
        id: config
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            PR="${{ github.event.issue.number }}"
            REF=$(gh pr view "$PR" --json headRefOid --jq '.headRefOid')
            echo "ref=$REF" >> "$GITHUB_OUTPUT"
            echo "version=PR #$PR" >> "$GITHUB_OUTPUT"
            echo "mode=pr" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
            echo "mode=release" >> "$GITHUB_OUTPUT"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
          else
            REF="${{ github.sha }}"
            VERSION="${{ inputs.version }}"
            if [ -z "$VERSION" ]; then
              VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo dev)
            fi
            echo "ref=$REF" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "mode=release" >> "$GITHUB_OUTPUT"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
          fi

      - name: React to comment
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content=rocket

  compile-auto:
    name: compile-auto
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.setup.outputs.ref }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Install hyperfine
        run: |
          wget -qO /tmp/hyperfine.deb https://github.com/sharkdp/hyperfine/releases/download/v1.18.0/hyperfine_1.18.0_amd64.deb
          sudo dpkg -i /tmp/hyperfine.deb
      - name: Run benchmark
        run: bash bench.sh "$COMPILE_RUNS" 2>&1 | tee compile-auto.txt
      - uses: actions/upload-artifact@v4
        with:
          name: compile-auto
          path: compile-auto.txt

  compile-configured:
    name: compile-configured
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.setup.outputs.ref }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Install hyperfine
        run: |
          wget -qO /tmp/hyperfine.deb https://github.com/sharkdp/hyperfine/releases/download/v1.18.0/hyperfine_1.18.0_amd64.deb
          sudo dpkg -i /tmp/hyperfine.deb
      - name: Run benchmark
        run: bash bench.sh --configured "$COMPILE_RUNS" 2>&1 | tee compile-configured.txt
      - uses: actions/upload-artifact@v4
        with:
          name: compile-configured
          path: compile-configured.txt

  runtime:
    name: runtime
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.setup.outputs.ref }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Reduce CI noise
        run: |
          # Disable CPU frequency scaling (use performance governor)
          for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
            echo performance | sudo tee "$cpu" 2>/dev/null || true
          done
          # Disable turbo boost to reduce variance
          echo 1 | sudo tee /sys/devices/system/cpu/intel_pstate/no_turbo 2>/dev/null || true
      - name: Run benchmark
        run: bash bench-runtime.sh "$RUNTIME_WARMUP" "$RUNTIME_ITERATIONS" 2>&1 | tee runtime.txt
      - uses: actions/upload-artifact@v4
        with:
          name: runtime
          path: runtime.txt

  macro-profile-auto:
    name: macro-profile-auto
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.setup.outputs.ref }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Run profiled compilation
        run: |
          rm -rf out/benchmark/sanely
          SANELY_PROFILE=true ./mill --no-server benchmark.sanely.compile 2>&1 | tee /tmp/raw-profile.txt
      - name: Analyze profile
        run: python3 .claude/skills/macro-profile/scripts/analyze_profile.py /tmp/raw-profile.txt 2>&1 | tee macro-profile-auto.txt
      - uses: actions/upload-artifact@v4
        with:
          name: macro-profile-auto
          path: macro-profile-auto.txt

  macro-profile-configured:
    name: macro-profile-configured
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.setup.outputs.ref }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Run profiled compilation
        run: |
          rm -rf out/benchmark-configured/sanely
          SANELY_PROFILE=true ./mill --no-server benchmark-configured.sanely.compile 2>&1 | tee /tmp/raw-profile.txt
      - name: Analyze profile
        run: python3 .claude/skills/macro-profile/scripts/analyze_profile.py /tmp/raw-profile.txt 2>&1 | tee macro-profile-configured.txt
      - uses: actions/upload-artifact@v4
        with:
          name: macro-profile-configured
          path: macro-profile-configured.txt

  # ── Post-release: accumulate results in BENCHMARK.md ──
  update-benchmark-md:
    name: Update BENCHMARK.md
    needs: [setup, compile-auto, compile-configured, runtime, macro-profile-auto, macro-profile-configured]
    if: needs.setup.outputs.mode == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Build new section
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          SHA="${{ needs.setup.outputs.ref }}"
          DATE="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          {
            echo ""
            echo "## $VERSION"
            echo ""
            echo "**Date:** $DATE | **SHA:** \`${SHA:0:7}\`"
            echo ""
            echo "### Compile Time — Auto Derivation"
            echo ""
            echo '```'
            cat results/compile-auto/*.txt
            echo '```'
            echo ""
            echo "### Compile Time — Configured Derivation"
            echo ""
            echo '```'
            cat results/compile-configured/*.txt
            echo '```'
            echo ""
            echo "### Runtime Performance"
            echo ""
            echo '```'
            cat results/runtime/*.txt
            echo '```'
            echo ""
            echo "### Macro Profile — Auto"
            echo ""
            echo '```'
            cat results/macro-profile-auto/*.txt
            echo '```'
            echo ""
            echo "### Macro Profile — Configured"
            echo ""
            echo '```'
            cat results/macro-profile-configured/*.txt
            echo '```'
          } > new-section.md

      - name: Update BENCHMARK.md
        run: |
          MARKER="<!-- BENCHMARK ENTRIES -->"

          if [ -f BENCHMARK.md ] && grep -q "$MARKER" BENCHMARK.md; then
            sed -i "/$MARKER/r new-section.md" BENCHMARK.md
          else
            {
              echo "# Benchmark History"
              echo ""
              echo "Automated benchmarks run on \`ubuntu-latest\` after each release."
              echo ""
              echo "$MARKER"
              cat new-section.md
            } > BENCHMARK.md
          fi

          echo "--- BENCHMARK.md ---"
          cat BENCHMARK.md

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          BRANCH="benchmark/$VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add BENCHMARK.md
          git commit -m "docs: add benchmark results for $VERSION"
          git push -f -u origin "$BRANCH"

          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists — updated via force push"
          else
            cat > /tmp/pr-body.md <<'BODY'
          Automated benchmark results. Merge to accumulate in `BENCHMARK.md`.

          **Contents:**
          - Compile time — auto derivation (~300 types)
          - Compile time — configured derivation (~230 types)
          - Runtime performance (circe-jawn vs circe+jsoniter vs jsoniter-scala)
          - Macro profile — auto derivation
          - Macro profile — configured derivation
          BODY

            gh pr create \
              --title "Benchmark results for $VERSION" \
              --body-file /tmp/pr-body.md \
              --base main
          fi

  # ── PR comment: post results on the pull request ──
  post-pr-comment:
    name: Post PR comment
    needs: [setup, compile-auto, compile-configured, runtime, macro-profile-auto, macro-profile-configured]
    if: needs.setup.outputs.mode == 'pr'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Post comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ needs.setup.outputs.ref }}"
          PR="${{ needs.setup.outputs.pr_number }}"

          {
            echo "## Benchmark Results"
            echo ""
            echo "**SHA:** \`${SHA:0:7}\` | **Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC') | **Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""
            echo "<details>"
            echo "<summary>Compile Time — Auto Derivation</summary>"
            echo ""
            echo '```'
            cat results/compile-auto/*.txt
            echo '```'
            echo "</details>"
            echo ""
            echo "<details>"
            echo "<summary>Compile Time — Configured Derivation</summary>"
            echo ""
            echo '```'
            cat results/compile-configured/*.txt
            echo '```'
            echo "</details>"
            echo ""
            echo "<details>"
            echo "<summary>Runtime Performance</summary>"
            echo ""
            echo '```'
            cat results/runtime/*.txt
            echo '```'
            echo "</details>"
            echo ""
            echo "<details>"
            echo "<summary>Macro Profile — Auto</summary>"
            echo ""
            echo '```'
            cat results/macro-profile-auto/*.txt
            echo '```'
            echo "</details>"
            echo ""
            echo "<details>"
            echo "<summary>Macro Profile — Configured</summary>"
            echo ""
            echo '```'
            cat results/macro-profile-configured/*.txt
            echo '```'
            echo "</details>"
          } > /tmp/comment-body.md

          gh pr comment "$PR" --body-file /tmp/comment-body.md
