<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>circe-sanely-auto Playground</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --success: #3fb950;
      --error: #f85149;
      --code-bg: #1c2129;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    #app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .header p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .header a {
      color: var(--accent);
      text-decoration: none;
    }

    .header a:hover {
      text-decoration: underline;
    }

    .examples-nav {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .example-btn {
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.15s;
    }

    .example-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .example-btn.active {
      border-color: var(--accent);
      background: rgba(88, 166, 255, 0.1);
      color: var(--accent);
    }

    .description {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      margin-bottom: 1rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .code-section {
      margin-bottom: 1.5rem;
    }

    .code-section h3 {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .code-section pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      overflow-x: auto;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .code-section code {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      color: var(--text);
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 768px) {
      .panels { grid-template-columns: 1fr; }
      #app { padding: 1rem; }
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
    }

    .panel-header h3 {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-group {
      display: flex;
      gap: 0.5rem;
    }

    .action-btn {
      padding: 0.35rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.15s;
    }

    .decode-btn {
      border-color: var(--accent);
      color: var(--accent);
    }

    .decode-btn:hover {
      background: rgba(88, 166, 255, 0.15);
    }

    .encode-btn {
      border-color: var(--success);
      color: var(--success);
    }

    .encode-btn:hover {
      background: rgba(63, 185, 80, 0.15);
    }

    .reset-btn:hover {
      border-color: var(--text-muted);
    }

    .json-input {
      width: 100%;
      min-height: 300px;
      padding: 1rem;
      border: none;
      background: transparent;
      color: var(--text);
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.85rem;
      line-height: 1.5;
      resize: vertical;
      outline: none;
    }

    .result-output {
      padding: 1rem;
      min-height: 300px;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.85rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
    }

    .result-output.success {
      color: var(--success);
    }

    .result-output.error {
      color: var(--error);
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>circe-sanely-auto Playground</h1>
      <p>Loading Scala.js...</p>
    </div>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
